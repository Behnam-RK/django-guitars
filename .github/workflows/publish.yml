name: Publish to PyPI

# Publishes on every vX.Y.Z tag push. Uses PyPI Trusted Publishing (OIDC) —
# no API token is stored anywhere. release.yml creates the GitHub Release from
# the same tag in parallel.
#
# Keyed on the tag push (not the release event) because release.yml creates the
# release with GITHUB_TOKEN, which does not emit `release: published`.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build and publish (Trusted Publishing)
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
