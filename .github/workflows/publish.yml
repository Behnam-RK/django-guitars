name: Publish to PyPI

# Publishes on every GitHub Release. Uses PyPI Trusted Publishing (OIDC) —
# no API token is stored anywhere. Bump the version, tag, and publish a
# Release; this builds and uploads automatically.
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish (Trusted Publishing)
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
