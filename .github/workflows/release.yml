name: Release and Publish

# Creates a GitHub Release from a vX.Y.Z tag, using the matching CHANGELOG.md
# section as the release notes (falling back to auto-generated notes when the
# version has no changelog entry). Can also publish to PyPI via Trusted
# Publishing (OIDC), but only as an explicit opt-in on a manual run --
# tagging/releasing alone never ships to PyPI.
#
# Triggers:
#   - push of a vX.Y.Z tag (the normal path) -- creates/updates the release.
#   - manual run (workflow_dispatch) against an existing tag, picked from the
#     "Use workflow from" ref selector above (a dropdown/search box over
#     branches and tags -- there's no free-text `tag` input, so it's always
#     current). Rebuilds the release notes, and additionally publishes to
#     PyPI if the `publish` input is checked.
#
# Restricted to main: releases are only ever cut from main (tag-release.yml
# only auto-tags pushes to main). The "Verify tag is on main" step rejects any
# tag whose commit isn't reachable from main, since a tag push event can't be
# filtered by branch in `on:` alone, and workflow_dispatch could otherwise be
# run against any tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Also publish this tag to PyPI'
        type: boolean
        default: false

permissions:
  contents: write  # required to create the release

jobs:
  release:
    name: Create release from tag
    runs-on: ubuntu-latest
    steps:
      - name: Require a tag ref
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "::error::Select a tag in the 'Use workflow from' dropdown above (got ref '${{ github.ref_name }}', a ${{ github.ref_type }})."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::$GITHUB_REF_NAME is not reachable from main; releases are only cut from main."
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          notes_file="$(mktemp)"
          bash scripts/changelog-notes.sh "${GITHUB_REF_NAME#v}" > "$notes_file" || true
          if [ -s "$notes_file" ]; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          fi
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Determine pre-release flag
        id: prerelease
        run: |
          if printf '%s' "${GITHUB_REF_NAME#v}" | grep -qE '(a|b|rc|alpha|beta|dev)[0-9]*$'; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          notes_file="${{ steps.notes.outputs.notes_file }}"
          if [ "${{ steps.notes.outputs.have_notes }}" != "true" ]; then
            # `--generate-notes` only exists on `release create`, not `release
            # edit`, so fetch the same auto-generated notes via the API and
            # write them to notes_file -- one code path for both branches below.
            gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f "tag_name=$tag" --jq .body > "$notes_file"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file" ${{ steps.prerelease.outputs.flag }}
          else
            gh release create "$tag" --title "$tag" --verify-tag --notes-file "$notes_file" ${{ steps.prerelease.outputs.flag }}
          fi

  publish:
    name: Build and publish to PyPI (Trusted Publishing)
    needs: release
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
