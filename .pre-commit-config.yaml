# Pre-commit hooks.
#   uv run pre-commit install         # enable on every commit
#   uv run pre-commit run --all-files # run across the whole repo
#
# Astral tools (ruff/ty/bandit) run via `uv run` so they use the exact
# versions pinned in pyproject.toml / uv.lock — one source of truth.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.18
    hooks:
      - id: uv-lock  # keep uv.lock in sync with pyproject.toml

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ty
        name: ty type check
        entry: uv run ty check src/
        language: system
        types: [python]
        pass_filenames: false
      - id: bandit
        name: bandit security scan
        entry: uv run bandit -q -r src/
        language: system
        types: [python]
        pass_filenames: false
