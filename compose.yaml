# Local Postgres for development and the test suite.
# The kit's soft-delete + updated_at behavior is enforced by PostgreSQL rules
# and triggers, so a real Postgres is required to run/test it.
#
#   docker compose up -d
#   uv run pytest
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: guitars
      POSTGRES_PASSWORD: guitars
      POSTGRES_DB: guitars
    ports:
      - "4455:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guitars -d guitars"]
      interval: 2s
      timeout: 3s
      retries: 20
